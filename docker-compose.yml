services:
  app:
    build: .
    container_name: laravel_app
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret

  db:
    image: postgres:17
    container_name: pg_db
    restart: always
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "65432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  node:
    build: .
    container_name: node_builder
    volumes:
      - .:/var/www
    command: tail -f /dev/null

  composer:
    build: .
    container_name: composer_tool
    volumes:
      - .:/var/www
    command: tail -f /dev/null

volumes:
  postgres_data: